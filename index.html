<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* Estilização dos nós do markmap */

    font-size: 14px !important;
    fill: #e8eaf6 !important;

  }

  .markmap-node line {
    stroke-width: 2.5 !important;
  }

  .markmap-link {
    stroke-width: 2 !important;
    opacity: 0.7 !important;
  }

  /* Header bar */
  .header-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(90deg, rgba(13,71,161,0.95) 0%, rgba(21,101,192,0.9) 50%, rgba(25,118,210,0.85) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-avatar {
    width: 48px; height: 48px;

    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .header-info h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);

  .header-info p {
    font-size: 11px;
    opacity: 0.75;
    font-weight: 400;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 18px;
    border-radius: 10px;

    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.25s ease;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .btn-primary {
    background: linear-gradient(135deg, #e53935, #c62828);
    border-color: rgba(229,57,53,0.5);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #ef5350, #e53935);
    box-shadow: 0 4px 20px rgba(229,57,53,0.4);
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(13,25,70,0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .legend h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.6;
    margin-bottom: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 12px;
    font-weight: 400;
  }

  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }

  /* Watermark */
  .watermark {
    position: fixed;
    bottom: 20px;
    right: 24px;
    z-index: 100;
    font-size: 10px;
    opacity: 0.4;
    font-weight: 400;
    text-align: right;
    line-height: 1.6;
  }

  /* Print styles */
  @media print {
    body { background: #fff !important; }
    .header-bar { background: #1565c0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .legend, .watermark { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .markmap-node text { fill: #1a237e !important; text-shadow: none !important; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4/dist/browser/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4/dist/browser/index.js"></script>
</head>
<body>

<!-- Header -->
<div class="header-bar">
  <div class="header-left">
    <div class="header-avatar">PR</div>
    <div class="header-info">
      <h1>Ecossistema de Monetização Teológica</h1>
      <p>PR Paulo Roberto &nbsp;|&nbsp; Consultoria Alex Mendes &nbsp;|&nbsp; 2026</p>
    </div>
  </div>
  <div class="header-right">
    <button class="btn" onclick="mm.fit()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      Centralizar
    </button>
    <button class="btn" onclick="expandAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      Expandir Tudo
    </button>
    <button class="btn" onclick="collapseAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      Recolher
    </button>
    <button class="btn btn-primary" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Exportar PDF
    </button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <h3>Legenda</h3>
  <div class="legend-item"><div class="legend-dot" style="background:#e53935"></div> Central</div>
  <div class="legend-item"><div class="legend-dot" style="background:#42a5f5"></div> Atração</div>
  <div class="legend-item"><div class="legend-dot" style="background:#26c6da"></div> Engajamento</div>
  <div class="legend-item"><div class="legend-dot" style="background:#66bb6a"></div> Monetização</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffa726"></div> Escada de Valor</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ab47bc"></div> Infraestrutura</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5c6bc0"></div> Cronograma</div>
</div>

<!-- Watermark -->
<div class="watermark">
  Alex Mendes Consulting<br>
  Synkra AIOS &bull; 2026
</div>

<svg id="markmap"></svg>

<script>
const md = `
# Ecossistema de Monetização Teológica

## 1. ATRAÇÃO
### Redes Sociais
- Instagram — Reels teológicos
- YouTube — Estudos bíblicos
- TikTok — Pílulas de conhecimento
- Facebook — Lives e debates
### Conteúdo Digital
- Blog/Site — Artigos SEO
- Podcast — Conversas semanais
- Newsletter — Reflexões por email
### Autoridade
- Pregações presenciais
- Conferências teológicas
- Parcerias com líderes
- Publicações acadêmicas
### KPIs
- Seguidores totais
- Alcance orgânico
- Leads capturados

## 2. ENGAJAMENTO
### Comunidade Digital
- WhatsApp — Devocional diário
- Telegram — Estudos e materiais
- YouTube Members — Exclusivo
- Discord — Discussões temáticas
### Nutrição
- Lives semanais Q&A
- Sequência de emails (7d)
- Desafios bíblicos (21d)
- Conteúdo bastidores
### Acompanhamento Pastoral
- Respostas personalizadas
- Oração online
- Aconselhamento digital
### KPIs
- Abertura emails >30%
- Participação em lives
- Retenção mensal >70%

## 3. MONETIZAÇÃO
### Cursos Online
- Introdutório R$ 97-197
- Avançado R$ 297-497
- Formação R$ 997-1.997
### E-books & Materiais
- E-book gratuito (lead magnet)
- E-books pagos R$ 27-47
- Guias de estudo R$ 37-67
### Conteúdo Premium
- Assinatura mensal R$ 29-79
- Séries exclusivas
- Biblioteca de sermões
### Mentoria Individual
- Teológica R$ 500-2.000/mês
- Para líderes R$ 1.000-3.000/mês
### Mentoria em Grupo
- Mastermind R$ 297-497/mês
- Formação de pregadores
### Consultoria
- Para igrejas
- Desenvolvimento ministerial
### Eventos
- Workshops R$ 197-497
- Retiros R$ 997-2.997
- Conferências online R$ 47-97
### Livros
- Livros físicos
- Audiobooks
- Devocionais impressos

## 4. ESCADA DE VALOR
### Gratuito
- Redes sociais
- Lives abertas
- E-book gratuito
### Baixo Ticket R$ 27-97
- E-books pagos
- Mini-cursos
- Comunidade básica
### Médio Ticket R$ 197-997
- Cursos completos
- Workshops
- Conferências
### Alto Ticket R$ 1.000-3.000+
- Mentoria individual
- Consultoria
- Retiros presenciais

## 5. INFRAESTRUTURA
### Plataforma de Cursos
- Hotmart / Kiwify / Eduzz
### Email Marketing
- ActiveCampaign / RD Station
- Automações de funil
### Comunidade
- WhatsApp Business
- Telegram
- Circle / Discord
### Landing Pages
- WordPress + Elementor
### Pagamentos
- Stripe / PagSeguro
- Recorrência Asaas / Vindi
### Analytics
- Google Analytics
- Meta Business Suite

## 6. CRONOGRAMA
### Mês 1-2: Fundação
- Perfis otimizados
- E-book gratuito
- Lista de emails
### Mês 2-3: Conteúdo
- 3 posts/semana
- 1 live/semana
- Newsletter ativa
### Mês 3-4: Comunidade
- Grupo WhatsApp/Telegram
- 100+ membros
### Mês 4-5: 1o Produto
- Curso introdutório
- Página de vendas
- Funil de lançamento
### Mês 5-8: Escala
- Mentoria
- Tráfego pago
### Mês 8-12: Otimização
- Assinatura mensal
- Eventos presenciais
- Flywheel ativo
`;

const { Transformer } = markmap;
const transformer = new Transformer();
const { root } = transformer.transform(md);

const el = document.getElementById('markmap');

// Cores baseadas no Miro: azuis, vermelho destaque, tons profissionais
const branchColors = [
  '#e53935', // central - vermelho (como o círculo do Miro)
  '#42a5f5', // 1. Atração - azul claro
  '#26c6da', // 2. Engajamento - ciano
  '#66bb6a', // 3. Monetização - verde
  '#ffa726', // 4. Escada de valor - laranja/dourado
  '#ab47bc', // 5. Infraestrutura - roxo
  '#5c6bc0', // 6. Cronograma - índigo
];

const mm = markmap.Markmap.create(el, {
  colorFreezeLevel: 2,
  duration: 400,
  maxWidth: 280,
  initialExpandLevel: 2,
  zoom: true,
  pan: true,
  paddingX: 20,
  spacingHorizontal: 80,
  spacingVertical: 8,
  autoFit: true,
  color: (node) => {
    const depth = node.state?.depth || 0;
    if (depth === 0) return '#e53935';
    if (depth === 1) {
      const idx = node.state?.index || 0;
      return branchColors[idx + 1] || '#42a5f5';
    }
    // Inherit parent color with slight transparency
    let current = node;
    while (current.state?.depth > 1 && current.parent) {
      current = current.parent;
    }
    const parentIdx = current.state?.index || 0;
    return branchColors[parentIdx + 1] || '#42a5f5';
  }
}, root);

function expandAll() {
  function setFold(node, val) {
    node.payload = { ...node.payload, fold: val };
    if (node.children) node.children.forEach(n => setFold(n, val));
  }
  setFold(root, 0);
  mm.setData(root);
  setTimeout(() => mm.fit(), 400);
}

function collapseAll() {
  function setFold(node, depth) {
    if (depth >= 2) {
      node.payload = { ...node.payload, fold: 1 };
    }
    if (node.children) node.children.forEach(n => setFold(n, depth + 1));
  }
  setFold(root, 0);
  mm.setData(root);
  setTimeout(() => mm.fit(), 400);
}

// Ajuste inicial com delay para carregar fontes
setTimeout(() => mm.fit(), 800);
</script>
